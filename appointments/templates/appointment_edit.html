<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>update Appointment</title>

    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --primary: #4d7cff;
            --primary-dark: #3455c8;
            --text: #1f2937;
            --muted: #6b7280;
            --border: rgba(99, 102, 241, 0.18);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.25), transparent 28%),
                        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.2), transparent 30%),
                        linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: min(100%, 460px);
            background: var(--surface);
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 30px 60px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        h2 {
            margin: 0 0 16px;
            font-size: 1.75rem;
            letter-spacing: -0.03em;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
        }

        select,
        button {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            font-size: 1rem;
            padding: 14px 16px;
            transition: all 0.2s ease;
        }

        select {
            background: #fafbff;
            color: var(--text);
            appearance: none;
        }

        select:focus,
        button:focus {
            outline: 2px solid rgba(79, 70, 229, 0.25);
            outline-offset: 2px;
        }

        select:hover {
            border-color: rgba(79, 70, 229, 0.35);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 130px;
            padding: 10px 14px;
            border-radius: 999px;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            background: var(--muted);
        }

        .status-badge.pending {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
        }

        .status-badge.completed {
            background: linear-gradient(135deg, #10b981, #22c55e);
        }

        .status-badge.cancelled {
            background: linear-gradient(135deg, #ef4444, #f97316);
        }

        .primary-btn {
            margin-top: 4px;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            box-shadow: 0 18px 32px rgba(79, 70, 229, 0.18);
            cursor: pointer;
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            background: linear-gradient(135deg, #3b5bdb, #2f4acb);
        }

        .back {
            text-align: center;
            margin-top: 22px;
        }

        .back a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Update Appointment</h2>
    <p class="subtitle">Edit the appointment status below and save your changes.</p>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="status">Appointment Status:</label>
            
        </div>

        <div class="status-row">
            <select name="status">
        <option value="Pending">Pending</option>
        <option value="Completed">Completed</option>
        <option value="Cancelled">Cancelled</option>
    </select>

        </div>

        <button type="submit" class="primary-btn">Update Appointment</button>
    </form>

    <div class="back">
        <a href="/appointments">⬅ Back to appointment</a>
    </div>
</div>

</body>
</html>
